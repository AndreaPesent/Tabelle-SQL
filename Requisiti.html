<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Creazione tabella</title>
<script>
function creaCampi() 
{
    let n = document.getElementById("numero").value;
    let area = document.getElementById("campi");
    area.innerHTML = "";
    for (let i = 1; i <= n; i++) 
    {
        area.innerHTML += `
        Colonna ${i}: 
        <input type="text" name="nome[]" placeholder="Nome" required>
        <select name="tipo[]">
            <option value="VARCHAR">VARCHAR</option>
            <option value="INT">INT</option>
            <option value="BOOLEAN">BOOLEAN</option>
            <option value="CHAR">CHAR</option>
        </select>
        NOT NULL <input type="checkbox" name="notnull[${i}]">
        PRIMARY KEY <input type="checkbox" name="pk[${i}]">
        <br><br>
        `;
    }
}
</script>
</head>
<body>
<form action="Tabelle.php" method="post">
    Nome Tabella:
    <input type="text" name="NomeTabella" required>
    <br><br>
    Numero Colonne:
    <input type="number" id="numero" onchange="creaCampi()" min="1" required>
    <br><br>
    <div id="campi"></div>
    <button type="submit">Invia i dati</button>
</form>
</body>
</html>
